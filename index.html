<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Gram Task App</title>
  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 15px;
      direction: ltr;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      background-color: #f39c12;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }
    .level {
      font-size: 12px;
      color: #888;
    }
    .balance-card {
      background: linear-gradient(135deg, #f39c12, #d35400);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    .balance-title {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 5px;
    }
    .balance-amount {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    .tab {
      flex: 1;
      background-color: #1e1e1e;
      border: none;
      color: #aaa;
      padding: 12px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      text-align: center;
      white-space: nowrap;
    }
    .tab.active {
      background-color: #f39c12;
      color: #000;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .task-card, .info-card {
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #2c2c2c;
      margin-bottom: 15px;
    }
    .task-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 5px;
    }
    .task-reward {
      color: #2ecc71;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .btn {
      width: 100%;
      background-color: #f39c12;
      border: none;
      color: #000;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      margin-bottom: 8px;
    }
    .btn-secondary {
      background-color: #2c2c2c;
      color: white;
    }
    .btn-success {
      background-color: #2ecc71;
      color: white;
    }
    .btn-danger {
      background-color: #e74c3c;
      color: white;
    }
    .btn:disabled {
      background-color: #444;
      color: #888;
      cursor: not-allowed;
    }
    .file-input {
      display: none;
    }
    .file-label {
      display: inline-block;
      width: 100%;
      padding: 10px;
      background-color: #2c2c2c;
      border: 1px dashed #f39c12;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      color: #f39c12;
      margin-bottom: 10px;
    }
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #bbb;
    }
    .input-field {
      width: 100%;
      padding: 10px;
      background-color: #121212;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }
    .history-item, .admin-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2c2c2c;
      padding: 12px 0;
    }
    .status-pending { color: #f1c40f; font-weight: bold; }
    .status-approved { color: #2ecc71; font-weight: bold; }
    .status-rejected { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">
    <div class="user-info">
      <div class="avatar" id="user-avatar">U</div>
      <div>
        <div id="username" style="font-weight: bold;">Loading User...</div>
        <div class="level">LV.1 Member</div>
      </div>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-title">Available Balance</div>
    <div class="balance-amount" id="balance-display">0.00 USDT</div>
    <button class="btn btn-secondary" style="margin: 5px auto 0; width: auto; padding: 6px 15px; font-size: 12px;" onclick="switchTab('withdraw', document.getElementById('tab-withdraw-btn'))" id="tab-withdraw-btn">Withdraw Funds</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks', this)">Tasks</button>
    <button class="tab" onclick="switchTab('history', this)">History</button>
    <button class="tab" id="admin-tab-btn" style="display: none;" onclick="switchTab('admin', this)">Admin Control</button>
  </div>

  <!-- TASKS TAB -->
  <div id="tasks-content" class="tab-content active">
    <div id="tasks-list">
      <div style="text-align: center; padding: 20px; color: #888;">Loading available tasks...</div>
    </div>
  </div>

  <!-- TASK HISTORY TAB -->
  <div id="history-content" class="tab-content">
    <div class="info-card">
      <div class="task-title" style="margin-bottom: 15px;">Your Submissions</div>
      <div id="history-list">
        <div style="color: #888; text-align: center; padding: 15px;">No tasks submitted yet.</div>
      </div>
    </div>
  </div>

  <!-- WITHDRAW TAB -->
  <div id="withdraw-content" class="tab-content">
    <div class="info-card">
      <div class="task-title" style="margin-bottom: 15px;">Withdraw Funds</div>
      <p style="font-size: 13px; color: #aaa; margin-bottom: 15px;">Minimum withdrawal is 1.00 USDT (TRC-20 Network).</p>
      <form onsubmit="handleWithdraw(event)">
        <div class="input-group">
          <label>USDT TRC-20 Wallet Address</label>
          <input type="text" class="input-field" id="withdraw-address" placeholder="T..." required>
        </div>
        <div class="input-group">
          <label>Amount to Withdraw (USDT)</label>
          <input type="number" step="0.01" class="input-field" id="withdraw-amount" placeholder="0.00" required>
        </div>
        <button type="submit" class="btn">REQUEST WITHDRAWAL</button>
      </form>
    </div>
  </div>

  <!-- ADMIN CONTROL TAB (Secured) -->
  <div id="admin-content" class="tab-content">
    <div class="info-card">
      <div class="task-title" style="color: #f39c12; margin-bottom: 15px;">➕ Create New Task</div>
      <form onsubmit="createNewTask(event)">
        <div class="input-group">
          <label>Task Title</label>
          <input type="text" class="input-field" id="new-task-title" placeholder="e.g. Join our Telegram" required>
        </div>
        <div class="input-group">
          <label>Reward Amount (USDT)</label>
          <input type="number" step="0.01" class="input-field" id="new-task-reward" placeholder="0.05" required>
        </div>
        <div class="input-group">
          <label>Target URL (Link)</label>
          <input type="url" class="input-field" id="new-task-url" placeholder="https://t.me/..." required>
        </div>
        <button type="submit" class="btn btn-success">PUBLISH TASK</button>
      </form>
    </div>

    <div class="info-card">
      <div class="task-title" style="color: #f39c12; margin-bottom: 15px;">⚙️ Manage Submissions</div>
      <div id="admin-submissions-list">
        <div style="color: #888; text-align: center; padding: 15px;">No pending reviews.</div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const BOT_TOKEN = "8967475773:AAFs4aj1TdGhelMkaxzi5dmwbCdb4SQ2ggQ";
    const ADMIN_CHAT_ID = "5967643083";
    const FIREBASE_URL = "https://megagramapp-fcda8-default-rtdb.firebaseio.com/";

    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // User Details
    const user = tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
    const userId = user ? String(user.id) : "demo_user_123";
    const userUsername = user && user.username ? "@" + user.username : "No_Username";
    const fullName = user ? (user.first_name + (user.last_name ? ' ' + user.last_name : '')) : "Guest User";

    document.getElementById('username').innerText = fullName;
    document.getElementById('user-avatar').innerText = fullName.charAt(0).toUpperCase();

    let userBalance = 0.00;

    // Show Admin Tab if user is Admin
    if (userId === ADMIN_CHAT_ID) {
      document.getElementById('admin-tab-btn').style.display = 'block';
    }

    // Load User Data & Tasks on Launch
    fetchUserData();
    loadTasks();
    loadSubmissionsHistory();
    if (userId === ADMIN_CHAT_ID) {
      loadAllSubmissionsForAdmin();
    }

    function fetchUserData() {
      fetch(`${FIREBASE_URL}users/${userId}.json`)
        .then(res => res.json())
        .then(data => {
          if (data) {
            userBalance = data.balance || 0.00;
          } else {
            userBalance = 0.00;
            saveUserData();
          }
          document.getElementById('balance-display').innerText = userBalance.toFixed(2) + " USDT";
        });
    }

    function saveUserData() {
      fetch(`${FIREBASE_URL}users/${userId}.json`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: userUsername,
          name: fullName,
          balance: userBalance
        })
      });
    }

    function loadTasks() {
      fetch(`${FIREBASE_URL}tasks.json`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('tasks-list');
          container.innerHTML = "";
          
          if (!data) {
            const defaultTasks = {
              "task-1": { title: "Follow on Telegram Channel", reward: 0.05, url: "https://t.me/your_telegram_channel" },
              "task-2": { title: "Subscribe to YouTube Channel", reward: 0.08, url: "https://youtube.com/@your_channel" }
            };
            fetch(`${FIREBASE_URL}tasks.json`, {
              method: "PUT",
              body: JSON.stringify(defaultTasks)
            }).then(() => loadTasks());
            return;
          }

          Object.keys(data).forEach(taskId => {
            const task = data[taskId];
            const card = document.createElement('div');
            card.className = "task-card";
            card.innerHTML = `
              <div class="task-title">${task.title}</div>
              <div class="task-reward">+${task.reward.toFixed(2)} USDT</div>
              <button class="btn" onclick="tg.openTelegramLink('${task.url}')">1. START TASK</button>
              <div class="proof-area">
                <label class="file-label" for="file-${taskId}" id="label-${taskId}">📎 Upload Proof Screenshot</label>
                <input type="file" id="file-${taskId}" class="file-input" accept="image/*" onchange="handleFileSelect(this, 'btn-${taskId}', 'label-${taskId}')">
                <button class="btn btn-secondary" id="btn-${taskId}" disabled onclick="submitTask('${taskId}', '${task.title}', ${task.reward}, 'file-${taskId}')">2. SUBMIT PROOF</button>
              </div>
            `;
            container.appendChild(card);
          });
        });
    }

    function handleFileSelect(input, btnId, labelId) {
      const btn = document.getElementById(btnId);
      const label = document.getElementById(labelId);
      if (input.files && input.files[0]) {
        label.innerText = "✓ Photo selected";
        label.style.borderColor = "#2ecc71";
        label.style.color = "#2ecc71";
        btn.disabled = false;
        btn.classList.remove('btn-secondary');
      }
    }

    function submitTask(taskId, taskTitle, reward, fileInputId) {
      const fileInput = document.getElementById(fileInputId);
      const file = fileInput.files[0];
      if (!file) return;

      const submissionId = "sub_" + Date.now();
      
      const reader = new FileReader();
      reader.onloadend = function() {
        const base64Data = reader.result;
        
        const submissionData = {
          userId: userId,
          username: userUsername,
          name: fullName,
          taskId: taskId,
          taskTitle: taskTitle,
          reward: reward,
          status: "pending",
          screenshot: base64Data,
          timestamp: new Date().toISOString()
        };

        fetch(`${FIREBASE_URL}submissions/${submissionId}.json`, {
          method: "PUT",
          body: JSON.stringify(submissionData)
        })
        .then(() => {
          tg.showAlert("Proof submitted! Waiting for Admin approval.");
          loadSubmissionsHistory();
          
          fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              chat_id: ADMIN_CHAT_ID,
              text: `🔔 **NEW SUBMISSION**\n👤 **User:** ${fullName} (${userUsername})\n📝 **Task:** ${taskTitle}\n💰 **Reward:** ${reward} USDT\n\n_Review this in the Admin Control Tab inside the Mini App._`,
              parse_mode: "Markdown"
            })
          });

          fileInput.value = "";
          document.getElementById(`label-${taskId}`).innerText = "📎 Upload Proof Screenshot";
          document.getElementById(`label-${taskId}`).style.borderColor = "#f39c12";
          document.getElementById(`label-${taskId}`).style.color = "#f39c12";
          document.getElementById(fileInputId.replace('file-', 'btn-')).disabled = true;
        });
      };
      reader.readAsDataURL(file);
    }

    function loadSubmissionsHistory() {
      fetch(`${FIREBASE_URL}submissions.json`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('history-list');
          container.innerHTML = "";
          let count = 0;

          if (data) {
            Object.keys(data).forEach(subId => {
              const sub = data[subId];
              if (sub.userId === userId) {
                count++;
                const item = document.createElement('div');
                item.className = "history-item";
                item.innerHTML = `
                  <div>
                    <div style="font-weight:bold;">${sub.taskTitle}</div>
                    <div style="font-size:12px; color:#888;">+${sub.reward.toFixed(2)} USDT</div>
                  </div>
                  <div class="status-${sub.status}">${sub.status.toUpperCase()}</div>
                `;
                container.appendChild(item);
              }
            });
          }
          if (count === 0) {
            container.innerHTML = '<div style="color:#888; text-align:center; padding:15px;">No submissions yet.</div>';
          }
        });
    }

    function handleWithdraw(event) {
      event.preventDefault();
      const address = document.getElementById('withdraw-address').value;
      const amount = parseFloat(document.getElementById('withdraw-amount').value);

      if (amount < 1.00) {
        tg.showAlert("Minimum withdrawal limit is 1.00 USDT.");
        return;
      }

      if (amount > userBalance) {
        tg.showAlert("Insufficient balance.");
        return;
      }

      userBalance -= amount;
      saveUserData();
      document.getElementById('balance-display').innerText = userBalance.toFixed(2) + " USDT";

      const withdrawId = "wd_" + Date.now();
      const wdData = {
        userId: userId,
        username: userUsername,
        name: fullName,
        address: address,
        amount: amount,
        status: "pending",
        timestamp: new Date().toISOString()
      };

      fetch(`${FIREBASE_URL}withdrawals/${withdrawId}.json`, {
        method: "PUT",
        body: JSON.stringify(wdData)
      }).then(() => {
        tg.showAlert("Withdrawal request sent successfully!");
        document.getElementById('withdraw-address').value = "";
        document.getElementById('withdraw-amount').value = "";

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: ADMIN_CHAT_ID,
            text: `💰 **NEW WITHDRAWAL REQUEST**\n👤 **User:** ${fullName} (${userUsername})\n💸 **Amount:** ${amount} USDT\n🔑 **TRC20 Wallet:** \`${address}\``,
            parse_mode: "Markdown"
          })
        });
      });
    }

    // Admin Tools
    function createNewTask(event) {
      event.preventDefault();
      const title = document.getElementById('new-task-title').value;
      const reward = parseFloat(document.getElementById('new-task-reward').value);
      const url = document.getElementById('new-task-url').value;

      const newId = "task_" + Date.now();
      const taskData = { title, reward, url };

      fetch(`${FIREBASE_URL}tasks/${newId}.json`, {
        method: "PUT",
        body: JSON.stringify(taskData)
      }).then(() => {
        tg.showAlert("Task published successfully!");
        document.getElementById('new-task-title').value = "";
        document.getElementById('new-task-reward').value = "";
        document.getElementById('new-task-url').value = "";
        loadTasks();
      });
    }

    function loadAllSubmissionsForAdmin() {
      fetch(`${FIREBASE_URL}submissions.json`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('admin-submissions-list');
          container.innerHTML = "";
          let pendingCount = 0;

          if (data) {
            Object.keys(data).forEach(subId => {
              const sub = data[subId];
              if (sub.status === "pending") {
                pendingCount++;
                const item = document.createElement('div');
                item.className = "admin-item";
                item.style.flexDirection = "column";
                item.style.alignItems = "flex-start";
                item.innerHTML = `
                  <div style="margin-bottom: 8px; width: 100%;">
                    <strong>👤 User:</strong> ${sub.name} (${sub.username})<br>
                    <strong>📝 Task:</strong> ${sub.taskTitle}<br>
                    <strong>💰 Reward:</strong> ${sub.reward} USDT
                  </div>
                  <img src="${sub.screenshot}" style="max-width: 100%; border-radius: 8px; margin-bottom: 10px;" alt="Proof">
                  <div style="display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-success" style="margin: 0;" onclick="approveSubmission('${subId}', '${sub.userId}', ${sub.reward})">Approve</button>
                    <button class="btn btn-danger" style="margin: 0; background-color: #e74c3c;" onclick="rejectSubmission('${subId}')">Reject</button>
                  </div>
                `;
                container.appendChild(item);
              }
            });
          }
          if (pendingCount === 0) {
            container.innerHTML = '<div style="color:#888; text-align:center; padding:15px;">No pending reviews.</div>';
          }
        });
    }

    function approveSubmission(subId, subUserId, reward) {
      fetch(`${FIREBASE_URL}submissions/${subId}/status.json`, {
        method: "PUT",
        body: JSON.stringify("approved")
      }).then(() => {
        fetch(`${FIREBASE_URL}users/${subUserId}/balance.json`)
          .then(res => res.json())
          .then(currentBalance => {
            const newBal = (currentBalance || 0.0) + reward;
            fetch(`${FIREBASE_URL}users/${sub
