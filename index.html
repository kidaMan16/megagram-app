<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Gram Task App</title>
  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 15px;
      direction: ltr;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      background-color: #f39c12;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }
    .level {
      font-size: 12px;
      color: #888;
    }
    .balance-card {
      background: linear-gradient(135deg, #f39c12, #d35400);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    .balance-title {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 5px;
    }
    .balance-amount {
      font-size: 28px;
      font-weight: bold;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      background-color: #1e1e1e;
      border: none;
      color: #aaa;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
    }
    .tab.active {
      background-color: #f39c12;
      color: #000;
    }
    .task-card {
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #2c2c2c;
    }
    .task-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 5px;
    }
    .task-reward {
      color: #2ecc71;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .btn {
      width: 100%;
      background-color: #f39c12;
      border: none;
      color: #000;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="user-info">
      <div class="avatar" id="user-avatar">U</div>
      <div>
        <div id="username" style="font-weight: bold;">Loading User...</div>
        <div class="level">LV.1 Newbie</div>
      </div>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-title">Available Balance</div>
    <div class="balance-amount">$0.00 USDT</div>
  </div>

  <div class="tabs">
    <button class="tab active">Tasks</button>
    <button class="tab">Task History</button>
    <button class="tab">Order Ads</button>
  </div>

  <div class="task-card">
    <div class="task-title">Follow on Telegram Channel</div>
    <div class="task-reward">+0.05 USDT</div>
    <button class="btn" onclick="startTask()">START TASK</button>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Get User Data from Telegram
    const user = tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
    
    if (user) {
      // Set User's First Name or Username
      document.getElementById('username').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
      // Set First Letter for Avatar
      document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
    } else {
      // Fallback if opened in regular web browser
      document.getElementById('username').innerText = "Guest User";
    }

    function startTask() {
      // Redirects to your channel (You can replace this with your actual channel link)
      tg.openTelegramLink("https://t.me/your_telegram_channel");
    }
  </script>
</body>
  </html>
