<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Gram Task App</title>
  <!-- Telegram Web App Script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 15px;
      direction: ltr;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      background-color: #f39c12;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }
    .level {
      font-size: 12px;
      color: #888;
    }
    .balance-card {
      background: linear-gradient(135deg, #f39c12, #d35400);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    .balance-title {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 5px;
    }
    .balance-amount {
      font-size: 28px;
      font-weight: bold;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      background-color: #1e1e1e;
      border: none;
      color: #aaa;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      text-align: center;
      transition: background-color 0.2s;
    }
    .tab.active {
      background-color: #f39c12;
      color: #000;
    }
    /* Tab Contents Styling */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .task-card, .info-card {
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #2c2c2c;
      margin-bottom: 15px;
    }
    .task-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 5px;
    }
    .task-reward {
      color: #2ecc71;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .btn {
      width: 100%;
      background-color: #f39c12;
      border: none;
      color: #000;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      margin-bottom: 8px;
    }
    .btn-secondary {
      background-color: #2c2c2c;
      color: white;
    }
    .btn:disabled {
      background-color: #444;
      color: #888;
      cursor: not-allowed;
    }
    .btn:active {
      opacity: 0.8;
    }
    /* Proof submission area */
    .proof-area {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #333;
    }
    .file-input {
      display: none;
    }
    .file-label {
      display: inline-block;
      width: 100%;
      padding: 10px;
      background-color: #2c2c2c;
      border: 1px dashed #f39c12;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      color: #f39c12;
      margin-bottom: 10px;
    }
    /* Form input styles for Order Ads */
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #bbb;
    }
    .input-field {
      width: 100%;
      padding: 10px;
      background-color: #121212;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2c2c2c;
      padding: 12px 0;
    }
    .history-item:last-child {
      border-bottom: none;
    }
    .status-pending {
      color: #f1c40f;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="user-info">
      <div class="avatar" id="user-avatar">U</div>
      <div>
        <div id="username" style="font-weight: bold;">Loading User...</div>
        <div class="level">LV.1 Newbie</div>
      </div>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-title">Available Balance</div>
    <div class="balance-amount" id="balance-display">$0.00 USDT</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks', this)">Tasks</button>
    <button class="tab" onclick="switchTab('history', this)">Task History</button>
    <button class="tab" onclick="switchTab('ads', this)">Order Ads</button>
  </div>

  <!-- TASKS TAB -->
  <div id="tasks-content" class="tab-content active">
    <!-- Task 1 -->
    <div class="task-card" id="task-1">
      <div class="task-title">Follow on Telegram Channel</div>
      <div class="task-reward">+0.05 USDT</div>
      <button class="btn" onclick="openTaskLink('https://t.me/your_telegram_channel', 'task-1')">1. START TASK</button>
      
      <div class="proof-area">
        <label class="file-label" for="file-1" id="file-label-1">📎 Upload Proof Screenshot</label>
        <input type="file" id="file-1" class="file-input" accept="image/*" onchange="handleFileSelect(this, 'submit-btn-1', 'file-label-1')">
        <button class="btn btn-secondary" id="submit-btn-1" disabled onclick="submitTask('Follow on Telegram Channel', 'file-1')">2. SUBMIT PROOF</button>
      </div>
    </div>

    <!-- Task 2 -->
    <div class="task-card" id="task-2">
      <div class="task-title">Subscribe to YouTube Channel</div>
      <div class="task-reward">+0.08 USDT</div>
      <button class="btn" onclick="openTaskLink('https://youtube.com/@your_channel', 'task-2')">1. START TASK</button>
      
      <div class="proof-area">
        <label class="file-label" for="file-2" id="file-label-2">📎 Upload Proof Screenshot</label>
        <input type="file" id="file-2" class="file-input" accept="image/*" onchange="handleFileSelect(this, 'submit-btn-2', 'file-label-2')">
        <button class="btn btn-secondary" id="submit-btn-2" disabled onclick="submitTask('Subscribe to YouTube Channel', 'file-2')">2. SUBMIT PROOF</button>
      </div>
    </div>
  </div>

  <!-- TASK HISTORY TAB -->
  <div id="history-content" class="tab-content">
    <div class="info-card">
      <div class="task-title" style="margin-bottom: 15px;">Your Completed Tasks</div>
      <div id="history-list">
        <!-- Completed tasks will dynamically appear here -->
        <div style="color: #888; text-align: center; padding: 15px;" id="no-history">No tasks submitted yet.</div>
      </div>
    </div>
  </div>

  <!-- ORDER ADS TAB -->
  <div id="ads-content" class="tab-content">
    <div class="info-card">
      <div class="task-title" style="margin-bottom: 15px;">Order Advertisement</div>
      <form onsubmit="submitAdForm(event)">
        <div class="input-group">
          <label>Ad Title (e.g. Join my channel)</label>
          <input type="text" class="input-field" placeholder="Enter title" required id="ad-title">
        </div>
        <div class="input-group">
          <label>Target URL (Link)</label>
          <input type="url" class="input-field" placeholder="https://t.me/..." required id="ad-url">
        </div>
        <div class="input-group">
          <label>Budget (USDT)</label>
          <input type="number" step="0.01" class="input-field" placeholder="0.00" required id="ad-budget">
        </div>
        <button type="submit" class="btn">SUBMIT AD ORDER</button>
      </form>
    </div>
  </div>

  <script>
    // Configuration
    const BOT_TOKEN = "8967475773:AAFs4aj1TdGhelMkaxzi5dmwbCdb4SQ2ggQ";
    const ADMIN_CHAT_ID = "5967643083";

    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // User Details
    const user = tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
    const userId = user ? user.id : "UnknownID";
    const userUsername = user && user.username ? "@" + user.username : "No_Username";
    const fullName = user ? (user.first_name + (user.last_name ? ' ' + user.last_name : '')) : "Guest User";

    document.getElementById('username').innerText = fullName;
    document.getElementById('user-avatar').innerText = fullName.charAt(0).toUpperCase();

    // Tab switcher
    function switchTab(tabId, tabButton) {
      const contents = document.getElementsByClassName('tab-content');
      for (let i = 0; i < contents.length; i++) {
        contents[i].classList.remove('active');
      }
      const buttons = document.getElementsByClassName('tab');
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
      }
      document.getElementById(tabId + '-content').classList.add('active');
      tabButton.classList.add('active');
    }

    // Open Link
    function openTaskLink(url, cardId) {
      tg.openTelegramLink(url);
    }

    // Handle File Selection
    function handleFileSelect(input, submitBtnId, labelId) {
      const submitBtn = document.getElementById(submitBtnId);
      const label = document.getElementById(labelId);
      
      if (input.files && input.files[0]) {
        label.innerText = "✓ Photo selected: " + input.files[0].name.substring(0, 15) + "...";
        label.style.borderColor = "#2ecc71";
        label.style.color = "#2ecc71";
        submitBtn.disabled = false;
        submitBtn.style.backgroundColor = "#f39c12";
        submitBtn.style.color = "#000";
      }
    }

    // Submit Task with Screenshot to Telegram Bot
    function submitTask(taskName, fileInputId) {
      const fileInput = document.getElementById(fileInputId);
      const file = fileInput.files[0];
      
      if (!file) {
        tg.showAlert("Please select a screenshot first!");
        return;
      }

      tg.showScanQrPopup({ text: "Sending proof..." }); // simple loader simulation
      setTimeout(() => tg.closeScanQrPopup(), 1000);

      // Create FormData to send image to Telegram Bot
      const formData = new FormData();
      formData.append("chat_id", ADMIN_CHAT_ID);
      formData.append("photo", file);
      
      // Caption with User Info for Admin Control
      const captionText = `🔔 **NEW TASK SUBMISSION** 🔔\n\n` +
                          `👤 **User:** ${fullName} (${userUsername})\n` +
                          `🆔 **ID:** \`${userId}\`\n` +
                          `📝 **Task:** ${taskName}\n\n` +
                          `Please review the attached screenshot.\n` +
                          `🔗 [Contact User](tg://user?id=${userId})`;
                          
      formData.append("caption", captionText);
      formData.append("parse_mode", "Markdown");

      // Send Photo using Telegram Bot API
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: "POST",
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if (data.ok) {
          tg.showAlert("Success! Your proof has been submitted. The admin will review it soon.");
          
          // Add to Local Task History
          const historyList = document.getElementById('history-list');
          const noHistory = document.getElementById('no-history');
          if (noHistory) noHistory.remove();

          const newItem = document.createElement('div');
          newItem.className = 'history-item';
          newItem.innerHTML = `
            <div>
              <div style="font-weight:bold;">${taskName}</div>
              <div style="font-size:12px; color:#888;">Just now</div>
            </div>
            <div class="status-pending">Pending Review</div>
          `;
          historyList.insertBefore(newItem, historyList.firstChild);

          // Reset inputs
          fileInput.value = "";
          const labelId = fileInputId === 'file-1' ? 'file-label-1' : 'file-label-2';
          const submitBtnId = fileInputId === 'file-1' ? 'submit-btn-1' : 'submit-btn-2';
          
          const label = document.getElementById(labelId);
          label.innerText = "📎 Upload Proof Screenshot";
          label.style.borderColor = "#f39c12";
          label.style.color = "#f39c12";
          
          document.getElementById(submitBtnId).disabled = true;
          document.getElementById(submitBtnId).style.backgroundColor = "#2c2c2c";
          document.getElementById(submitBtnId).style.color = "white";
        } else {
          tg.showAlert("Failed to send proof. Please try again.");
        }
      })
      .catch(error => {
        console.error("Error:", error);
        tg.showAlert("An error occurred while sending proof.");
      });
    }

    // Submit Ads Order
    function submitAdForm(event) {
      event.preventDefault();
      const title = document.getElementById('ad-title').value;
      const url = document.getElementById('ad-url').value;
      const budget = document.getElementById('ad-budget').value;

      // Send ad order details to Admin Bot
      const text = `📢 **NEW ADVERTISEMENT ORDER** 📢\n\n` +
                   `👤 **From:** ${fullName} (${userUsername})\n` +
                   `📝 **Ad Title:** ${title}\n` +
                   `🔗 **Link:** ${url}\n` +
                   `💰 **Budget:** ${budget} USDT`;

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: ADMIN_CHAT_ID,
          text: text,
          parse_mode: "Markdown"
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.ok) {
          tg.showAlert("Ad order submitted! Admin will contact you soon.");
          document.getElementById('ad-title').value = '';
          document.getElementById('ad-url').value = '';
          document.getElementById('ad-budget').value = '';
        } else {
          tg.showAlert("Failed to submit ad order.");
        }
      });
    }
  </script>
</body>
        </html>
