<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Gram Task App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #121212; color: #fff; padding: 15px; }
    .task-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
    .btn { width: 100%; background-color: #f39c12; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { background: #333; padding: 10px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab" onclick="loadContent('tasks')">Tasks</div>
    <div class="tab" onclick="loadContent('history')">History</div>
  </div>
  <div id="app">
    <div id="content">Loading...</div>
  </div>

  <script>
    const BIN_ID = "6a5872daf5f4af5e2995fe55";
    const MASTER_KEY = "$2a$10$74AmOf4Qxbtrlm/j6XkS1.ckSM9/0LreY.rgS7H/yC9gD93lHMYLC";

    // ዳታን ከ JSONBin የመጫኛ ፋንክሽን
    async function getDB() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": MASTER_KEY }
      });
      const data = await res.json();
      return data.record;
    }

    // መረጃን የማሳያ ፋንክሽን
    async function loadContent(page) {
      const db = await getDB();
      const content = document.getElementById('content');
      
      if (page === 'tasks') {
        content.innerHTML = "<h3>Tasks</h3>";
        Object.keys(db.tasks).forEach(id => {
          content.innerHTML += `
            <div class="task-card">
              <strong>${db.tasks[id].title}</strong><br>
              <small>Reward: ${db.tasks[id].reward} USDT</small>
              <button class="btn" onclick="window.open('${db.tasks[id].url}', '_blank')">Start</button>
            </div>`;
        });
      } else {
        content.innerHTML = "<h3>History</h3><p>No history found.</p>";
      }
    }

    // መጀመሪያ ሲከፈት
    loadContent('tasks');
  </script>
</body>
</html>
